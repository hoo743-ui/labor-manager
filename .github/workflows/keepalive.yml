name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 */5 * *'   # 5일마다 오전 9시 (UTC) 자동 실행
  workflow_dispatch:          # 수동 실행 버튼도 제공

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPA_URL }}/rest/v1/employees?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPA_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPA_KEY }}")
          echo "Supabase response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠ 응답 코드 $STATUS — Supabase 프로젝트 상태 확인 필요"
            exit 1
          fi
          echo "✅ Supabase 정상"
