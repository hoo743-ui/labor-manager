<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과제 인건비 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --bg:#0f1117;--sf:#181c27;--sf2:#1e2334;--sf3:#242840;
  --b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);--b3:rgba(255,255,255,0.2);
  --tx:#e8eaf0;--tx2:#8b92a8;--tx3:#484f66;
  --acc:#4f8ef7;--acc2:#2d6fe0;
  --grn:#2ecc87;--grn2:rgba(46,204,135,0.12);
  --amb:#f0a030;--amb2:rgba(240,160,48,0.12);
  --red:#f04060;--red2:rgba(240,64,96,0.1);
  --pur:#9b6dfa;
  --mono:'DM Mono',monospace;--sans:'Noto Sans KR',sans-serif;
  --r:8px;--rl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--sf);border-bottom:1px solid var(--b);flex-shrink:0}
.logo{font-size:15px;font-weight:700;letter-spacing:-.5px;white-space:nowrap}.logo em{color:var(--acc);font-style:normal}
.nav{display:flex;gap:2px;flex:1;justify-content:center}
.nav-btn{padding:6px 14px;border-radius:6px;border:none;background:none;color:var(--tx2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn:hover{color:var(--tx);background:var(--sf2)}
.nav-btn.on{color:var(--acc);background:rgba(79,142,247,0.13);font-weight:500}
.top-actions{display:flex;gap:6px;flex-shrink:0}
.btn{padding:5px 12px;border-radius:6px;border:none;font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-ghost{background:var(--sf2);color:var(--tx2);border:1px solid var(--b2)}.btn-ghost:hover{color:var(--tx)}
.btn-pri{background:var(--acc);color:#fff}.btn-pri:hover{background:var(--acc2)}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-danger{background:var(--red2);color:var(--red);border:1px solid rgba(240,64,96,0.25)}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:215px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--b);overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:20px}
.sb-section{padding:12px 0 4px}
.sb-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--tx3);padding:0 14px 5px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:6px;padding:6px 14px;cursor:pointer;font-size:12px;color:var(--tx2);transition:all .1s;position:relative;user-select:none}
.sb-item:hover{color:var(--tx);background:var(--sf2)}
.sb-item.on{color:var(--tx);background:rgba(79,142,247,0.08)}
.sb-item.on::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--acc);border-radius:0 3px 3px 0}
.sb-pill{margin-left:auto;font-size:10px;font-family:var(--mono);padding:1px 5px;border-radius:3px;flex-shrink:0}
.pill-ok{background:var(--grn2);color:var(--grn)}
.pill-warn{background:var(--amb2);color:var(--amb)}
.pill-err{background:var(--red2);color:var(--red)}
.pill-gray{background:rgba(255,255,255,0.05);color:var(--tx3)}
.sb-div{height:1px;background:var(--b);margin:4px 14px}
.card{background:var(--sf);border:1px solid var(--b);border-radius:var(--rl);padding:18px}
.card-err{border-color:rgba(240,64,96,0.3);background:rgba(240,64,96,0.03)}
.card-warn{border-color:rgba(240,160,48,0.28);background:rgba(240,160,48,0.03)}
.card-ok{border-color:rgba(46,204,135,0.2)}
.card-acc{border-color:rgba(79,142,247,0.25);background:rgba(79,142,247,0.04)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:6px}
.kpi-val{font-size:22px;font-weight:700;font-family:var(--mono);line-height:1}
.kpi-sub{font-size:11px;color:var(--tx3);margin-top:4px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh-t{font-size:14px;font-weight:700}
.sh-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--sf2);color:var(--tx3);font-weight:500;text-align:left;padding:8px 10px;white-space:nowrap;border-bottom:1px solid var(--b);position:sticky;top:0;z-index:1}
thead th.r{text-align:right}
tbody tr{border-bottom:1px solid var(--b)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.02)}
tbody td{padding:7px 10px;color:var(--tx2);white-space:nowrap}
td.name{color:var(--tx);font-weight:500}
td.num{font-family:var(--mono);text-align:right;font-size:12px}
td.ctr{text-align:center}
.prog{background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.prog-bar{height:100%;border-radius:99px;transition:width .4s}
.p-grn{background:var(--grn)}.p-amb{background:var(--amb)}.p-red{background:var(--red)}.p-acc{background:var(--acc)}
.tag{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:.03em;white-space:nowrap}
.t-책임{background:rgba(155,109,250,0.18);color:var(--pur)}
.t-공동{background:rgba(79,142,247,0.15);color:var(--acc)}
.t-cosd{background:rgba(46,204,135,0.15);color:var(--grn)}
.t-ok{background:var(--grn2);color:var(--grn)}
.t-warn{background:var(--amb2);color:var(--amb)}
.t-err{background:var(--red2);color:var(--red)}
.t-gray{background:rgba(255,255,255,0.07);color:var(--tx3)}
.mpills{display:flex;gap:3px;flex-wrap:wrap}
.mpill{padding:4px 9px;border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--mono);color:var(--tx3);border:1px solid var(--b);background:none;transition:all .12s}
.mpill:hover{border-color:var(--b2);color:var(--tx2)}
.mpill.on{background:var(--acc2);border-color:var(--acc);color:#fff}
.pv-input{width:52px;background:transparent;border:1px solid transparent;color:var(--tx2);border-radius:4px;padding:3px 5px;font-family:var(--mono);font-size:12px;text-align:right;transition:all .12s}
.pv-input:hover{border-color:var(--b2);background:var(--sf2)}
.pv-input:focus{border-color:var(--acc);background:var(--sf2);outline:none;color:var(--tx)}
.pv-input.v-over{color:var(--red)!important;border-color:rgba(240,64,96,0.4)!important}
.pv-input.v-low{color:var(--amb)!important;border-color:rgba(240,160,48,0.3)!important}
.sum-ok{color:var(--grn);font-weight:600;font-family:var(--mono);font-size:12px}
.sum-warn{color:var(--amb);font-weight:600;font-family:var(--mono);font-size:12px}
.sum-over{color:var(--red);font-weight:600;font-family:var(--mono);font-size:12px}
.sum-gray{color:var(--tx3);font-family:var(--mono);font-size:12px}
.brow{margin-bottom:10px}
.brow-head{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;margin-bottom:4px}
.brow-name{color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.alert{display:flex;gap:10px;padding:10px 12px;border-radius:var(--r);margin-bottom:8px;font-size:12px}
.alert-err{background:var(--red2);border:1px solid rgba(240,64,96,0.3);color:var(--red)}
.alert-warn{background:var(--amb2);border:1px solid rgba(240,160,48,0.28);color:var(--amb)}
.alert-info{background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.2);color:var(--acc)}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.form-label{font-size:11px;color:var(--tx3)}
.form-input{background:var(--sf2);border:1px solid var(--b);color:var(--tx);border-radius:6px;padding:7px 10px;font-size:12px;font-family:var(--sans);outline:none;transition:border-color .15s;width:100%}
.form-input:focus{border-color:var(--acc)}
.form-input.mono{font-family:var(--mono)}
select.form-input option{background:var(--sf2)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--sf);border:1px solid var(--b2);border-radius:var(--rl);padding:22px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--b)}
#toast{position:fixed;bottom:22px;right:22px;background:var(--sf2);border:1px solid var(--b2);color:var(--tx);font-size:12px;padding:9px 16px;border-radius:8px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:200}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:99px}
.sep{height:1px;background:var(--b);margin:14px 0}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.mb14{margin-bottom:14px}
.rem-wrap{position:relative;height:22px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;margin:4px 0}
.rem-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px 0 0 4px;transition:width .4s}
.rem-label{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:10px;font-family:var(--mono);color:var(--tx3)}

/* ── RATE CELL (클릭 가능한 셀 버튼) ── */
.rate-cell{
  display:inline-flex;align-items:center;justify-content:flex-end;
  width:58px;height:28px;padding:0 7px;
  border-radius:5px;border:1px solid transparent;
  font-family:var(--mono);font-size:12px;color:var(--tx2);
  cursor:pointer;transition:all .12s;user-select:none;
  position:relative;
}
.rate-cell:hover{border-color:var(--b2);background:var(--sf2);color:var(--tx)}
.rate-cell.active{border-color:var(--acc);background:rgba(79,142,247,0.12);color:var(--acc)}
.rate-cell.rc-over{color:var(--red);border-color:rgba(240,64,96,0.35);background:rgba(240,64,96,0.07)}
.rate-cell.rc-low{color:var(--amb);border-color:rgba(240,160,48,0.3);background:rgba(240,160,48,0.06)}
.rate-cell.rc-ok{color:var(--grn)}
.rate-cell-dot{width:5px;height:5px;border-radius:50%;margin-right:4px;flex-shrink:0}

/* ── RATE POPOVER ── */
#rate-pop{
  position:fixed;z-index:300;
  background:var(--sf);border:1px solid var(--b2);
  border-radius:14px;padding:18px 20px;width:300px;
  box-shadow:0 16px 48px rgba(0,0,0,.55);
  display:none;
}
#rate-pop.open{display:block;animation:popIn .15s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pop-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.pop-proj{font-size:12px;font-weight:600;color:var(--tx);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pop-month{font-size:11px;color:var(--tx3);margin-top:2px}
.pop-close{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;padding:0;line-height:1;flex-shrink:0}
.pop-close:hover{color:var(--tx)}

/* 슬라이더 */
.pop-slider-wrap{margin-bottom:16px}
.pop-slider-val{display:flex;align-items:baseline;gap:6px;margin-bottom:10px}
.pop-val-big{font-size:32px;font-weight:700;font-family:var(--mono);line-height:1;transition:color .15s}
.pop-val-unit{font-size:14px;color:var(--tx3)}
.pop-val-exec{font-size:11px;color:var(--tx3);margin-left:4px}
input[type=range]#pop-slider{
  -webkit-appearance:none;appearance:none;
  width:100%;height:6px;border-radius:99px;outline:none;cursor:pointer;
  background:var(--sf2);
  transition:background .2s;
}
input[type=range]#pop-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:20px;height:20px;border-radius:50%;
  background:var(--acc);border:3px solid var(--sf);
  box-shadow:0 0 0 2px var(--acc);
  cursor:pointer;transition:transform .1s;
}
input[type=range]#pop-slider::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type=range]#pop-slider:active::-webkit-slider-thumb{transform:scale(1.2)}
.pop-slider-ticks{display:flex;justify-content:space-between;margin-top:5px}
.pop-tick{font-size:9px;font-family:var(--mono);color:var(--tx3)}

/* 빠른 선택 버튼 */
.pop-presets{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.pop-preset{padding:4px 10px;border-radius:5px;border:1px solid var(--b);background:none;color:var(--tx3);font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .1s}
.pop-preset:hover{border-color:var(--b2);color:var(--tx2);background:var(--sf2)}
.pop-preset.active-pre{border-color:var(--acc);color:var(--acc);background:rgba(79,142,247,0.1)}

/* 상태 정보 패널 */
.pop-status{display:flex;flex-direction:column;gap:7px;padding:12px;background:var(--sf2);border-radius:8px;border:1px solid var(--b)}
.pop-stat-row{display:flex;justify-content:space-between;align-items:center;font-size:11px}
.pop-stat-label{color:var(--tx3)}
.pop-stat-val{font-family:var(--mono);font-weight:600}
.pop-stat-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:99px;margin-top:3px;overflow:hidden}
.pop-stat-bar-fill{height:100%;border-radius:99px;transition:width .25s}

/* 역할 뱃지 선택 */
.pop-roles{display:flex;gap:6px;margin-bottom:14px}
.pop-role{padding:5px 12px;border-radius:6px;border:1px solid var(--b);background:none;font-size:11px;font-family:var(--sans);cursor:pointer;color:var(--tx3);transition:all .12s}
.pop-role:hover{border-color:var(--b2);color:var(--tx2)}
.pop-role.sel-책임{border-color:var(--pur);color:var(--pur);background:rgba(155,109,250,0.12)}
.pop-role.sel-공동{border-color:var(--acc);color:var(--acc);background:rgba(79,142,247,0.12)}
.pop-role.sel-cosd{border-color:var(--grn);color:var(--grn);background:rgba(46,204,135,0.1)}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">
<div class="topbar">
  <div class="logo">과제<em>Lab</em></div>
  <nav class="nav">
    <button class="nav-btn on"  onclick="nav('dash')">대시보드</button>
    <button class="nav-btn"     onclick="nav('proj')">과제별 현황</button>
    <button class="nav-btn"     onclick="nav('emp')">직원별 참여율</button>
    <button class="nav-btn"     onclick="nav('salary')">급여 · 잔액</button>
    <button class="nav-btn"     onclick="nav('master')">기준 데이터</button>
  </nav>
  <div class="top-actions">
    <span id="db-status" style="font-size:11px;font-family:var(--mono);color:var(--tx3);white-space:nowrap">🔄 연결 중...</span>
    <button class="btn btn-ghost" style="font-size:11px" onclick="saveToDB()">💾 저장</button>
    <button class="btn btn-ghost" onclick="document.getElementById('xu').click()">↑ 불러오기</button>
    <input type="file" id="xu" accept=".xlsx,.xls" style="display:none" onchange="importXL(this)">
    <button class="btn btn-pri" onclick="exportXL()">↓ 내보내기</button>
  </div>
</div>
<div class="body">
<div class="sidebar">
  <div class="sb-section"><div class="sb-label">직원</div><div id="sb-emps"></div></div>
  <div class="sb-div"></div>
  <div class="sb-section"><div class="sb-label">과제</div><div id="sb-projs"></div></div>
</div>
<div class="main" id="main"></div>
</div>
</div>

<!-- RATE POPOVER -->
<div id="rate-pop">
  <div class="pop-header">
    <div>
      <div class="pop-proj" id="pop-proj-name"></div>
      <div class="pop-month" id="pop-month-label"></div>
    </div>
    <button class="pop-close" onclick="closePop()">✕</button>
  </div>

  <!-- 역할 선택 -->
  <div class="pop-roles" id="pop-roles">
    <button class="pop-role" data-role="책임" onclick="popSetRole('책임')">책임자</button>
    <button class="pop-role" data-role="공동" onclick="popSetRole('공동')">공동참여</button>
    <button class="pop-role" data-role="cosd" onclick="popSetRole('cosd')">COSD</button>
  </div>

  <!-- 큰 숫자 + 슬라이더 -->
  <div class="pop-slider-wrap">
    <div class="pop-slider-val">
      <span class="pop-val-big" id="pop-val">0</span>
      <span class="pop-val-unit">%</span>
      <span class="pop-val-exec" id="pop-exec"></span>
    </div>
    <input type="range" id="pop-slider" min="0" max="100" step="1" value="0" oninput="popSlide(this.value)">
    <div class="pop-slider-ticks">
      <span class="pop-tick">0</span><span class="pop-tick">25</span>
      <span class="pop-tick">50</span><span class="pop-tick">75</span>
      <span class="pop-tick">100</span>
    </div>
  </div>

  <!-- 빠른 선택 -->
  <div class="pop-presets">
    <button class="pop-preset" onclick="popSetVal(0)">0%</button>
    <button class="pop-preset" onclick="popSetVal(10)">10%</button>
    <button class="pop-preset" onclick="popSetVal(20)">20%</button>
    <button class="pop-preset" onclick="popSetVal(30)">30%</button>
    <button class="pop-preset" onclick="popSetVal(50)">50%</button>
    <button class="pop-preset" onclick="popSetVal(100)">100%</button>
  </div>

  <!-- 실시간 상태 -->
  <div class="pop-status">
    <div class="pop-stat-row">
      <span class="pop-stat-label">이달 집행 예정액</span>
      <span class="pop-stat-val" id="ps-exec" style="color:var(--acc)">-</span>
    </div>
    <div class="pop-stat-row" style="margin-top:2px">
      <span class="pop-stat-label">직원 유효참여율 합계</span>
      <span class="pop-stat-val" id="ps-eff">-</span>
    </div>
    <div class="pop-stat-bar"><div class="pop-stat-bar-fill" id="ps-eff-bar" style="width:0%"></div></div>
    <div class="pop-stat-row" style="margin-top:4px">
      <span class="pop-stat-label">과제 인건비 잔여 (연간)</span>
      <span class="pop-stat-val" id="ps-rem">-</span>
    </div>
    <div class="pop-stat-bar"><div class="pop-stat-bar-fill" id="ps-rem-bar" style="width:0%;background:var(--grn)"></div></div>
    <div class="pop-stat-row" style="margin-top:4px">
      <span class="pop-stat-label" id="ps-min-label">최소 참여율</span>
      <span class="pop-stat-val" id="ps-min">-</span>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="overlay" id="import-ov">
  <div class="modal" style="width:500px">
    <div class="modal-title">엑셀 불러오기 결과</div>
    <div id="import-result" style="font-size:13px;line-height:2;color:var(--tx2)"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOv('import-ov')">취소</button>
      <button class="btn btn-pri" onclick="applyImport()">적용하기</button>
    </div>
  </div>
</div>
<div class="overlay" id="emp-ov">
  <div class="modal" style="width:400px">
    <div class="modal-title" id="emp-ov-t">직원 추가</div>
    <div class="form-row"><div class="form-label">직원 ID</div><input class="form-input mono" id="fi-eid" placeholder="E08"></div>
    <div class="form-row"><div class="form-label">이름</div><input class="form-input" id="fi-ename" placeholder="홍길동"></div>
    <div class="form-row"><div class="form-label">사원코드 (선택)</div><input class="form-input mono" id="fi-ecode" placeholder="20201026"></div>
    <div class="form-row"><div class="form-label">직급</div>
      <select class="form-input" id="fi-erank">
        <option>책임연구원</option><option>선임연구원</option><option>연구원</option><option>보조연구원</option><option>기타</option>
      </select></div>
    <div class="form-row"><div class="form-label">기본급 (월, 원)</div><input class="form-input mono" id="fi-esal" type="number" step="10000" placeholder="4500000"></div>
    <div class="form-row"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--tx2)">
      <input type="checkbox" id="fi-ecosd"> COSD/특정사업 참여자 (10% 100% 산입 제외)
    </label></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOv('emp-ov')">취소</button>
      <button class="btn btn-pri" onclick="saveEmp()">저장</button>
    </div>
  </div>
</div>
<div class="overlay" id="proj-ov">
  <div class="modal" style="width:440px">
    <div class="modal-title" id="proj-ov-t">과제 추가</div>
    <div class="form-row"><div class="form-label">과제 ID</div><input class="form-input mono" id="fi-pid" placeholder="P08"></div>
    <div class="form-row"><div class="form-label">과제명</div><input class="form-input" id="fi-pname" placeholder="○○ 연구개발 과제"></div>
    <div class="form-row"><div class="form-label">유형</div>
      <select class="form-input" id="fi-ptype"><option value="normal">일반</option><option value="cosd">COSD</option><option value="special">특정사업</option></select></div>
    <div class="form-row"><div class="form-label">인건비 예산 (원)</div><input class="form-input mono" id="fi-pbudget" type="number" step="100000" placeholder="80000000"></div>
    <div class="form-row">
      <div class="form-label">최소 참여율 (%)</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="form-input mono" id="fi-pmin" type="number" min="0" max="100" value="10" style="width:80px">
        <span style="font-size:11px;color:var(--tx3)">일반 10% / 특정과제 20%</span>
      </div>
    </div>
    <div class="form-row"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--tx2)">
      <input type="checkbox" id="fi-p345" checked> 3책5공 카운팅에 포함 <span style="font-size:11px;color:var(--tx3)">(제외 과제는 해제)</span>
    </label></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOv('proj-ov')">취소</button>
      <button class="btn btn-pri" onclick="saveProj()">저장</button>

  </div>
</div>
<div class="overlay" id="sal-ov">
  <div class="modal" style="width:460px">
    <div class="modal-title" id="sal-ov-t">급여 입력</div>
    <div style="font-size:11px;color:var(--tx3);margin-bottom:14px">미입력 월은 기본급으로 자동 계산됩니다.</div>
    <div id="sal-ov-f" style="display:grid;grid-template-columns:1fr 1fr;gap:8px"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOv('sal-ov')">취소</button>
      <button class="btn btn-pri" onclick="saveSal()">저장</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
function r12(rate,role){return Array.from({length:12},()=>({rate,role}));}

const S={
  view:'dash',selMonth:new Date().getMonth(),selProj:null,selEmp:null,
  employees:[
    {id:'E01',name:'김연구',code:'20201026',rank:'책임연구원',baseSalary:5200000,isCosd:false},
    {id:'E02',name:'이박사',code:'20260126',rank:'선임연구원',baseSalary:4800000,isCosd:false},
    {id:'E03',name:'박연구',code:'20040102',rank:'연구원',baseSalary:3800000,isCosd:true},
    {id:'E04',name:'최선임',code:'20050603',rank:'선임연구원',baseSalary:4500000,isCosd:false},
    {id:'E05',name:'정연구',code:'20100118',rank:'연구원',baseSalary:3600000,isCosd:false},
    {id:'E06',name:'한박사',code:'20110207',rank:'책임연구원',baseSalary:5500000,isCosd:false},
    {id:'E07',name:'오연구',code:'20130522',rank:'연구원',baseSalary:3500000,isCosd:true},
  ],
  projects:[
    {id:'P01',name:'차세대 배터리 소재',type:'normal',budget:120000000,include345:true,minRate:10},
    {id:'P02',name:'AI 신약 개발',type:'normal',budget:95000000,include345:true,minRate:20},
    {id:'P03',name:'COSD 스마트팜',type:'cosd',budget:60000000,include345:false,minRate:10},
    {id:'P04',name:'탄소포집 기술',type:'normal',budget:80000000,include345:true,minRate:10},
    {id:'P05',name:'수소연료전지',type:'normal',budget:75000000,include345:true,minRate:10},
    {id:'P06',name:'양자컴퓨팅 알고리즘',type:'normal',budget:50000000,include345:false,minRate:10},
    {id:'P07',name:'해양 바이오 소재',type:'normal',budget:40000000,include345:true,minRate:10},
  ],
  participation:{
    E01:{P01:r12(30,'책임'),P02:r12(20,'공동'),P04:r12(10,'공동')},
    E02:{P02:r12(35,'책임'),P05:r12(25,'공동'),P06:r12(20,'공동'),P01:r12(20,'공동')},
    E03:{P03:r12(10,'cosd'),P01:r12(30,'공동'),P04:r12(40,'책임'),P07:r12(30,'공동')},
    E04:{P05:r12(35,'책임'),P07:r12(30,'공동'),P02:r12(15,'공동'),P06:r12(20,'공동')},
    E05:{P06:r12(50,'책임'),P04:r12(30,'공동'),P07:r12(20,'공동')},
    E06:{P01:r12(25,'공동'),P02:r12(30,'책임'),P05:r12(20,'공동'),P03:r12(15,'cosd')},
    E07:{P03:r12(10,'cosd'),P07:r12(40,'책임'),P05:r12(30,'공동'),P04:r12(20,'공동')},
  },
  salary:{
    E01:[5250000,5250000,5400000,null,null,null,null,null,null,null,null,null],
    E02:[4850000,4850000,null,null,null,null,null,null,null,null,null,null],
    E03:[3820000,null,null,null,null,null,null,null,null,null,null,null],
    E04:Array(12).fill(null),E05:Array(12).fill(null),
    E06:Array(12).fill(null),E07:Array(12).fill(null),
  },
};

// ── COMPUTED ──
function getRate(e,p,m){return S.participation[e]?.[p]?.[m]?.rate??0}
function getRole(e,p,m){return S.participation[e]?.[p]?.[m]?.role??''}
function getSal(e,m){const v=S.salary[e]?.[m];return(v!=null)?v:(S.employees.find(x=>x.id===e)?.baseSalary??0)}
function isCfm(e,m){return S.salary[e]?.[m]!=null}
function effRate(e,m){let t=0;for(const p of Object.keys(S.participation[e]??{}))if(getRole(e,p,m)!=='cosd')t+=getRate(e,p,m);return t}
function cosdRate(e,m){let t=0;for(const p of Object.keys(S.participation[e]??{}))if(getRole(e,p,m)==='cosd')t+=getRate(e,p,m);return t}
function get345(e){let c=0,j=0;for(const p of Object.keys(S.participation[e]??{})){const proj=S.projects.find(x=>x.id===p);if(!proj?.include345)continue;const r=S.participation[e][p][0]?.role||'';if(r==='책임')c++;else if(r==='공동')j++;}return{chief:c,joint:j}}
function mExec(e,p,m){return Math.round(getSal(e,m)*getRate(e,p,m)/100)}
function projAnn(pid){let t=0;for(const e of Object.keys(S.participation)){if(!S.participation[e][pid])continue;for(let m=0;m<12;m++)t+=mExec(e,pid,m);}return t}
function projUpTo(pid,upto){let t=0;for(const e of Object.keys(S.participation)){if(!S.participation[e][pid])continue;for(let m=0;m<upto;m++)t+=mExec(e,pid,m);}return t}
function cfmUpTo(pid,upto){let t=0;for(const e of Object.keys(S.participation)){if(!S.participation[e][pid])continue;for(let m=0;m<upto;m++)if(isCfm(e,m))t+=mExec(e,pid,m);}return t}
function hasMinVio(pid){const proj=S.projects.find(p=>p.id===pid);if(!proj)return false;for(const e of Object.keys(S.participation)){if(!S.participation[e][pid])continue;for(let m=0;m<12;m++){const r=getRate(e,pid,m);if(r>0&&r<proj.minRate)return true;}}return false}
function allAlerts(){
  const al=[];
  for(const emp of S.employees){
    for(let m=0;m<12;m++){const e=effRate(emp.id,m);if(e>100)al.push({t:'err',msg:`${emp.name} ${MN[m]}: 유효참여율 ${e}% 초과`});else if(e>90)al.push({t:'warn',msg:`${emp.name} ${MN[m]}: ${e}% (주의)`});}
    const{chief,joint}=get345(emp.id);
    if(chief>3)al.push({t:'err',msg:`${emp.name}: 책임자 ${chief}개 (3초과)`});
    if(joint>5)al.push({t:'err',msg:`${emp.name}: 공동 ${joint}개 (5초과)`});
  }
  for(const proj of S.projects){
    const p2=pct(projAnn(proj.id),proj.budget);
    if(p2>100)al.push({t:'err',msg:`[${proj.name}] 예산 초과 (${p2}%)`});
    else if(p2>90)al.push({t:'warn',msg:`[${proj.name}] 예산 ${p2}% 소진 예정`});
    if(hasMinVio(proj.id))al.push({t:'warn',msg:`[${proj.name}] 최소참여율 ${proj.minRate}% 미달 항목`});
  }
  return al;
}
const fmt=n=>new Intl.NumberFormat('ko-KR').format(Math.round(n));
const fmtM=n=>n>=100000000?(n/100000000).toFixed(1)+'억':n>=10000?Math.round(n/10000)+'만':fmt(n);
const pct=(a,b)=>b?Math.round(a/b*100):0;
const clamp=(v,lo,hi)=>Math.min(Math.max(v,lo),hi);
const pCls=p=>p>100?'p-red':p>90?'p-amb':'p-grn';
const sCls=p=>p>100?'sum-over':p>90?'sum-warn':p>0?'sum-ok':'sum-gray';
const rCol=r=>r<0?'var(--red)':r<0.15?'var(--amb)':'var(--tx2)';

// ── SIDEBAR ──
function renderSidebar(){
  const eEl=document.getElementById('sb-emps'),pEl=document.getElementById('sb-projs');
  if(!eEl||!pEl)return;
  eEl.innerHTML=S.employees.map(emp=>{
    const mx=Math.max(...Array.from({length:12},(_,m)=>effRate(emp.id,m)));
    const{chief,joint}=get345(emp.id);
    const over=mx>100||chief>3||joint>5,warn=mx>90&&!over;
    return `<div class="sb-item${S.view==='emp'&&S.selEmp===emp.id?' on':''}" onclick="selEmp('${emp.id}')">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${emp.name}</span>
      ${emp.isCosd?'<span class="tag t-cosd" style="font-size:9px;padding:1px 4px">C</span>':''}
      <span class="sb-pill ${over?'pill-err':warn?'pill-warn':'pill-ok'}">${over?'초과':warn?mx+'%':'정상'}</span>
    </div>`;
  }).join('');
  pEl.innerHTML=S.projects.map(proj=>{
    const p=pct(projAnn(proj.id),proj.budget);
    return `<div class="sb-item${S.view==='proj'&&S.selProj===proj.id?' on':''}" onclick="selProj('${proj.id}')" title="${proj.name}">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">${proj.name}</span>
      <span class="sb-pill ${p>100?'pill-err':p>90?'pill-warn':'pill-ok'}">${p}%</span>
    </div>`;
  }).join('');
}

// ── DASH ──
function renderDash(){
  const al=allAlerts(),errs=al.filter(a=>a.t==='err').length,warns=al.filter(a=>a.t==='warn').length;
  const tB=S.projects.reduce((s,p)=>s+p.budget,0),tE=S.projects.reduce((s,p)=>s+projAnn(p.id),0);
  const m=S.selMonth;
  const mByP=S.projects.map(proj=>({proj,exec:Object.keys(S.participation).reduce((s,e)=>s+mExec(e,proj.id,m),0)}));
  const mTot=mByP.reduce((s,x)=>s+x.exec,0);
  return `
  <div class="sh"><div><div class="sh-t">전체 현황</div><div class="sh-sub">직원 ${S.employees.length}명 · 과제 ${S.projects.length}건</div></div></div>
  <div class="g4 mb14">
    <div class="card ${errs>0?'card-err':'card-ok'}"><div class="kpi-label">오류</div><div class="kpi-val" style="color:${errs>0?'var(--red)':'var(--grn)'}">${errs}</div><div class="kpi-sub">초과·위반</div></div>
    <div class="card ${warns>0?'card-warn':''}"><div class="kpi-label">경고</div><div class="kpi-val" style="color:${warns>0?'var(--amb)':'var(--tx2)'}">${warns}</div><div class="kpi-sub">주의 필요</div></div>
    <div class="card"><div class="kpi-label">총 인건비 예산</div><div class="kpi-val">${fmtM(tB)}</div><div class="kpi-sub">전체 과제 합산</div></div>
    <div class="card ${pct(tE,tB)>100?'card-err':pct(tE,tB)>90?'card-warn':''}"><div class="kpi-label">연간 집행 예정</div><div class="kpi-val">${fmtM(tE)}</div><div class="kpi-sub">${pct(tE,tB)}% 사용</div></div>
  </div>
  ${al.length?`<div class="mb14">${al.slice(0,5).map(a=>`<div class="alert alert-${a.t}"><span>${a.t==='err'?'✕':'!'}</span>${a.msg}</div>`).join('')}${al.length>5?`<div style="font-size:11px;color:var(--tx3);margin-top:2px">외 ${al.length-5}건</div>`:''}</div>`:''}
  <div class="sh mb14"><div class="sh-t" style="font-size:13px">${MN[m]} 월 현황</div>
    <div class="mpills">${MN.map((mn,i)=>`<button class="mpill${i===m?' on':''}" onclick="selM(${i})">${mn}</button>`).join('')}</div>
  </div>
  <div class="g2 mb14">
    <div class="card">
      <div style="font-size:12px;font-weight:600;margin-bottom:12px">직원별 ${MN[m]} 유효참여율</div>
      ${S.employees.map(emp=>{
        const eff=effRate(emp.id,m),cr=cosdRate(emp.id,m),cls=pCls(eff),sc=sCls(eff);
        return `<div class="brow"><div class="brow-head"><span class="brow-name">${emp.name} <span style="font-size:10px;color:var(--tx3)">${emp.rank}</span></span>
          <span class="${sc}">${eff}%${cr?` +COSD${cr}%`:''}</span></div>
          <div class="prog" style="height:6px"><div class="prog-bar ${cls}" style="width:${Math.min(eff,100)}%"></div></div></div>`;
      }).join('')}
    </div>
    <div class="card">
      <div style="font-size:12px;font-weight:600;margin-bottom:12px">과제별 예산 소진율 (연간)</div>
      ${S.projects.map(proj=>{
        const exec=projAnn(proj.id),p=pct(exec,proj.budget),cls=pCls(p),sc=sCls(p);
        return `<div class="brow"><div class="brow-head"><span class="brow-name">${proj.name}</span><span class="${sc}">${p}%</span></div>
          <div class="prog" style="height:6px"><div class="prog-bar ${cls}" style="width:${Math.min(p,100)}%"></div></div></div>`;
      }).join('')}
    </div>
  </div>
  <div class="card">
    <div style="font-size:12px;font-weight:600;margin-bottom:12px">${MN[m]} 과제별 집행 예정액</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>직원</th>${S.projects.map(p=>`<th class="r" title="${p.name}">${p.name.slice(0,5)}${p.name.length>5?'…':''}</th>`).join('')}<th class="r">합계</th></tr></thead>
      <tbody>
        ${S.employees.map(emp=>{
          const tot=S.projects.reduce((s,proj)=>s+mExec(emp.id,proj.id,m),0);
          return `<tr><td class="name">${emp.name}</td>${S.projects.map(proj=>{const ex=mExec(emp.id,proj.id,m),cf=isCfm(emp.id,m);return`<td class="num" style="color:${ex>0?cf?'var(--grn)':'var(--tx2)':'var(--tx3)'}">${ex>0?fmt(ex):'-'}</td>`;}).join('')}<td class="num sum-ok">${tot>0?fmt(tot):'-'}</td></tr>`;
        }).join('')}
        <tr style="background:var(--sf2)"><td class="name" style="color:var(--tx3)">합계</td>${mByP.map(x=>`<td class="num" style="font-weight:600">${x.exec>0?fmt(x.exec):'-'}</td>`).join('')}<td class="num" style="color:var(--acc);font-weight:700">${fmt(mTot)}</td></tr>
      </tbody>
    </table></div>
  </div>`;
}

// ── PROJ ──
function renderProj(){
  const pid=S.selProj||S.projects[0]?.id;
  if(!pid)return'<div class="card">과제 없음</div>';
  const proj=S.projects.find(p=>p.id===pid);
  const exec=projAnn(pid),rem=proj.budget-exec,p=pct(exec,proj.budget);
  const cfmExec=cfmUpTo(pid,12);
  const participants=S.employees.filter(emp=>S.participation[emp.id]?.[pid]);
  const mRows=Array.from({length:12},(_,m)=>{
    const me=Object.keys(S.participation).reduce((s,e)=>s+mExec(e,pid,m),0);
    const cum=projUpTo(pid,m+1),cfmCum=cfmUpTo(pid,m+1);
    return{m,me,cum,cfmCum,rem:proj.budget-cum,cfmRem:proj.budget-cfmCum};
  });
  const lastCfm=Array.from({length:12},(_,m)=>S.employees.some(e=>S.participation[e.id]?.[pid]&&isCfm(e.id,m))).lastIndexOf(true);
  const avail=lastCfm>=0?proj.budget-cfmUpTo(pid,lastCfm+1):proj.budget;

  return `
  <div class="mpills mb14" style="gap:4px">
    ${S.projects.map(pr=>`<button class="mpill${pr.id===pid?' on':''}" onclick="selProj('${pr.id}')"
      style="font-size:11px;font-family:var(--sans);padding:4px 10px">${pr.name.slice(0,8)}${pr.name.length>8?'…':''}</button>`).join('')}
  </div>
  <div class="card ${p>100?'card-err':p>90?'card-warn':''} mb14">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div><div style="font-size:16px;font-weight:700;margin-bottom:6px">${proj.name}</div>
        <div class="chip-row">
          <span class="tag ${proj.type==='cosd'?'t-cosd':'t-gray'}">${proj.type==='cosd'?'COSD':proj.type==='special'?'특정사업':'일반'}</span>
          <span class="tag ${proj.include345?'t-ok':'t-warn'}">${proj.include345?'3책5공 포함':'3책5공 제외'}</span>
          <span class="tag ${proj.minRate>10?'t-warn':'t-gray'}">최소 ${proj.minRate}%</span>
          ${hasMinVio(pid)?'<span class="tag t-err">⚠ 최소참여율 미달</span>':''}
        </div>
      </div>
      <div style="text-align:right"><div style="font-size:11px;color:var(--tx3)">인건비 예산</div>
        <div style="font-size:20px;font-weight:700;font-family:var(--mono)">${fmt(proj.budget)}<span style="font-size:12px;color:var(--tx3)">원</span></div>
      </div>
    </div>
    <div class="sep"></div>
    <div class="g2" style="margin-bottom:0">
      <div>
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px">
          <span style="color:var(--tx3)">연간 집행 예정</span><span class="${sCls(p)}">${fmt(exec)}원 (${p}%)</span>
        </div>
        <div class="prog" style="height:8px"><div class="prog-bar ${pCls(p)}" style="width:${Math.min(p,100)}%"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:5px">
          <span style="color:var(--tx3)">잔여 예산</span>
          <span style="color:${rem<0?'var(--red)':rem<proj.budget*0.1?'var(--amb)':'var(--tx2)'};font-family:var(--mono)">${fmt(rem)}원</span>
        </div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px">
          <span style="color:var(--tx3)">확정급여 기반 집행</span><span style="color:var(--grn);font-family:var(--mono)">${fmt(cfmExec)}원</span>
        </div>
        <div class="prog" style="height:8px"><div class="prog-bar p-acc" style="width:${Math.min(pct(cfmExec,proj.budget),100)}%"></div></div>
        <div style="font-size:11px;margin-top:5px;color:var(--tx3)">
          ${lastCfm>=0?`${MN[lastCfm]} 이후 가용: <span style="color:var(--acc);font-family:var(--mono);font-weight:600">${fmt(avail)}원</span>`:'급여 확정 후 표시'}
        </div>
      </div>
    </div>
  </div>

  <div class="card mb14">
    <div style="font-size:13px;font-weight:600;margin-bottom:12px">월별 집행액 · 잔여예산 추적 ★</div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>월</th>${participants.map(e=>`<th class="r">${e.name}</th>`).join('')}
        <th class="r">월합계</th><th class="r">누적집행</th>
        <th class="r" style="min-width:130px">잔여예산</th><th class="r">확정 후 잔여</th>
      </tr></thead>
      <tbody>
        ${mRows.map(({m,me,cum,cfmCum,rem:rv,cfmRem})=>{
          const anyCfm=S.employees.some(e=>S.participation[e.id]?.[pid]&&isCfm(e.id,m));
          const rp=pct(rv,proj.budget);
          return `<tr${m===lastCfm?' style="background:rgba(46,204,135,0.04)"':''}>
            <td class="name" style="font-size:11px">${MN[m]}${m===lastCfm?'<span class="tag t-ok" style="font-size:9px;margin-left:4px">확정</span>':''}</td>
            ${participants.map(emp=>{
              const ex=mExec(emp.id,pid,m),cf=isCfm(emp.id,m);
              const low=getRate(emp.id,pid,m)>0&&getRate(emp.id,pid,m)<proj.minRate;
              return `<td class="num" style="color:${low?'var(--amb)':cf&&ex>0?'var(--grn)':ex>0?'var(--tx2)':'var(--tx3)'}">${ex>0?fmt(ex):'-'}${low?'<span class="tag t-warn" style="font-size:8px;margin-left:2px">!</span>':''}</td>`;
            }).join('')}
            <td class="num" style="font-weight:600">${me>0?fmt(me):'-'}</td>
            <td class="num" style="color:var(--acc)">${fmt(cum)}</td>
            <td class="num">
              <span style="color:${rv<0?'var(--red)':rv<proj.budget*0.15?'var(--amb)':'var(--tx2)'};font-family:var(--mono)">${fmt(rv)}</span>
              <div class="prog" style="height:5px;margin-top:3px;width:70px;margin-left:auto"><div class="prog-bar ${rp<15?'p-red':rp<30?'p-amb':'p-grn'}" style="width:${clamp(rp,0,100)}%"></div></div>
            </td>
            <td class="num" style="color:${anyCfm?cfmRem<0?'var(--red)':'var(--grn)':'var(--tx3)'};font-family:var(--mono)">${anyCfm?fmt(cfmRem):'-'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>

  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:4px">참여율 입력 — ${proj.name}</div>
    <div style="font-size:11px;color:var(--tx3);margin-bottom:12px">최소 ${proj.minRate}% 이상 필요 · 셀 직접 수정 가능 · 노란색=미달, 빨간색=전체100%초과</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>직원</th><th>역할</th>${MN.map(mn=>`<th class="r">${mn}</th>`).join('')}<th class="r">평균</th></tr></thead>
      <tbody>
        ${participants.map(emp=>{
          const months=S.participation[emp.id][pid];
          const role=months[0]?.role||'공동';
          const avg=Math.round(months.reduce((s,v)=>s+v.rate,0)/12);
          return `<tr>
            <td class="name">${emp.name}</td>
            <td><span class="tag t-${role}">${role==='cosd'?'COSD':role}</span></td>
            ${months.map((mv,m)=>
              `<td style="padding:5px 6px">${rateCell(emp.id,pid,m)}</td>`
            ).join('')}
            <td class="${sCls(avg)}">${avg}%</td>
          </tr>`;
        }).join('')}
        <tr style="background:var(--sf2)" id="sum-proj-${pid}"><td colspan="2" style="color:var(--tx3);font-size:11px">월 집행예정</td>
          ${Array.from({length:12},(_,m)=>{const tot=participants.reduce((s,e)=>s+mExec(e.id,pid,m),0);return`<td class="num" style="color:var(--tx2)">${tot>0?fmt(tot):'-'}</td>`;}).join('')}<td></td></tr>
      </tbody>
    </table></div>
  </div>`;
}

// ── EMP ──
function renderEmp(){
  const eid=S.selEmp||S.employees[0]?.id;
  if(!eid)return'<div class="card">직원 없음</div>';
  const emp=S.employees.find(e=>e.id===eid);
  const{chief,joint}=get345(eid);
  const projs=Object.keys(S.participation[eid]||{});

  return `
  <div class="mpills mb14" style="gap:4px">
    ${S.employees.map(e=>`<button class="mpill${e.id===eid?' on':''}" onclick="selEmp('${e.id}')"
      style="font-size:11px;font-family:var(--sans);padding:4px 10px">${e.name}</button>`).join('')}
  </div>
  <div class="card ${chief>3||joint>5?'card-err':''} mb14">
    <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start">
      <div style="flex:1"><div style="font-size:16px;font-weight:700;margin-bottom:6px">${emp.name}</div>
        <div class="chip-row">
          <span class="tag t-gray">${emp.rank}</span>
          ${emp.isCosd?'<span class="tag t-cosd">COSD/특정사업</span>':''}
          <span class="tag ${chief>3?'t-err':'t-ok'}">책임 ${chief}/3</span>
          <span class="tag ${joint>5?'t-err':'t-ok'}">공동 ${joint}/5</span>
          ${emp.code?`<span class="tag t-gray" style="font-family:var(--mono)">${emp.code}</span>`:''}
        </div>
      </div>
      <div><div style="font-size:11px;color:var(--tx3)">기본급</div>
        <div style="font-size:18px;font-weight:700;font-family:var(--mono)">${fmt(emp.baseSalary)}<span style="font-size:11px;color:var(--tx3)">원/월</span></div>
      </div>
    </div>
    <div class="sep"></div>
    <div style="font-size:11px;color:var(--tx3);margin-bottom:8px">월별 유효참여율 (COSD 제외 기준 · 100% 초과 시 빨간색)</div>
    <div style="display:grid;grid-template-columns:repeat(12,1fr);gap:3px">
      ${Array.from({length:12},(_,m)=>{
        const eff=effRate(eid,m),cr=cosdRate(eid,m),cls=pCls(eff),sc=eff>100?'var(--red)':eff>90?'var(--amb)':'var(--tx2)';
        return `<div style="text-align:center">
          <div style="font-size:9px;color:var(--tx3);margin-bottom:2px">${MN[m].replace('월','')}</div>
          <div class="prog" style="height:36px;position:relative;border-radius:3px;display:flex;flex-direction:column-reverse;background:rgba(255,255,255,0.05)">
            <div class="prog-bar ${cls}" style="width:100%;height:${Math.min(eff,100)}%;border-radius:3px;min-height:${eff>0?2:0}px"></div>
          </div>
          <div style="font-size:10px;font-family:var(--mono);color:${sc};margin-top:2px">${eff}%</div>
          ${cr?`<div style="font-size:9px;color:var(--grn)">+${cr}</div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:12px">과제별 참여율 입력</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>과제명</th><th>역할</th>${MN.map(mn=>`<th class="r">${mn}</th>`).join('')}<th class="r">평균</th></tr></thead>
      <tbody>
        ${projs.map(pid=>{
          const proj=S.projects.find(p=>p.id===pid);if(!proj)return'';
          const months=S.participation[eid][pid],role=months[0]?.role||'공동';
          const avg=Math.round(months.reduce((s,v)=>s+v.rate,0)/12);
          return `<tr>
            <td class="name" style="font-size:11px;max-width:130px;overflow:hidden;text-overflow:ellipsis">${proj.name}${!proj.include345?'<span class="tag t-warn" style="font-size:9px;margin-left:3px">제외</span>':''}</td>
            <td><span class="tag t-${role}">${role==='cosd'?'COSD':role}</span></td>
            ${months.map((mv,m)=>
              `<td style="padding:5px 6px">${rateCell(eid,pid,m)}</td>`
            ).join('')}
            <td class="${sCls(avg)}">${avg}%</td>
          </tr>`;
        }).join('')}
        <tr style="background:var(--sf2)" id="sum-eff-${eid}"><td colspan="2" style="color:var(--tx3);font-size:11px">유효참여율 합계</td>
          ${Array.from({length:12},(_,m)=>{const e2=effRate(eid,m),cr=cosdRate(eid,m);return`<td class="${sCls(e2)}" style="text-align:right">${e2}%${cr?`<span style="font-size:10px;color:var(--grn)"> +${cr}</span>`:''}</td>`;}).join('')}<td></td></tr>
        <tr style="background:var(--sf2)"><td colspan="2" style="color:var(--tx3);font-size:11px">월 집행예정 합계</td>
          ${Array.from({length:12},(_,m)=>{const tot=projs.reduce((s,pid)=>s+mExec(eid,pid,m),0),cf=isCfm(eid,m);return`<td class="num" style="color:${cf?'var(--grn)':'var(--tx2)'}">${tot>0?fmt(tot):'-'}</td>`;}).join('')}<td></td></tr>
      </tbody>
    </table></div>
  </div>`;
}

// ── SALARY ──
function renderSalary(){
  return `
  <div class="sh"><div><div class="sh-t">급여 · 잔액 관리</div><div class="sh-sub">확정 급여 입력 → 과제별 잔여예산 실시간 반영</div></div></div>
  <div class="alert alert-info mb14"><span>💡</span>
    <span>확정 급여를 입력한 월은 <span style="color:var(--grn)">초록색</span>, 미입력 월은 기본급(괄호)으로 계산됩니다.
    확정 급여를 입력한 마지막 월 기준 이후 <span style="color:var(--acc)">가용 인건비</span>가 과제별로 자동 표시됩니다.</span>
  </div>
  <div class="card mb14">
    <div style="font-size:13px;font-weight:600;margin-bottom:12px">직원별 월급여</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>직원</th><th>기본급</th>${MN.map(mn=>`<th class="r">${mn}</th>`).join('')}<th></th></tr></thead>
      <tbody>
        ${S.employees.map(emp=>`<tr>
          <td class="name">${emp.name}</td>
          <td class="num" style="color:var(--tx3)">${fmt(emp.baseSalary)}</td>
          ${Array.from({length:12},(_,m)=>{const cf=isCfm(emp.id,m),s=getSal(emp.id,m);
            return`<td class="num" style="color:${cf?'var(--grn)':'var(--tx3)'}">${cf?fmt(s):`<span style="font-size:10px">(${fmt(emp.baseSalary)})</span>`}</td>`;}).join('')}
          <td><button class="btn btn-ghost btn-sm" onclick="openSalOv('${emp.id}')">편집</button></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>
  <div style="font-size:13px;font-weight:600;margin-bottom:12px">과제별 월별 잔여예산 · 가용금액 ★</div>
  ${S.projects.map(proj=>{
    const ann=projAnn(proj.id),p=pct(ann,proj.budget);
    const mData=Array.from({length:12},(_,m)=>{
      const me=Object.keys(S.participation).reduce((s,e)=>s+mExec(e,proj.id,m),0);
      return{m,me,cum:projUpTo(proj.id,m+1),cfmCum:cfmUpTo(proj.id,m+1),rem:proj.budget-projUpTo(proj.id,m+1),cfmRem:proj.budget-cfmUpTo(proj.id,m+1)};
    });
    const lastCfm=Array.from({length:12},(_,m)=>S.employees.some(e=>S.participation[e.id]?.[proj.id]&&isCfm(e.id,m))).lastIndexOf(true);
    const avail=lastCfm>=0?proj.budget-cfmUpTo(proj.id,lastCfm+1):proj.budget;
    return `
    <div class="card mb14">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <div><span style="font-weight:600">${proj.name}</span>
          <div class="chip-row"><span class="tag ${proj.include345?'t-ok':'t-warn'}">${proj.include345?'3책5공':'3책5공 제외'}</span><span class="tag t-gray">예산 ${fmt(proj.budget)}원</span></div>
        </div>
        <div style="text-align:right">
          <span class="${sCls(p)}" style="font-size:15px">${fmtM(ann)} (${p}%)</span>
          ${lastCfm>=0?`<div style="font-size:11px;margin-top:3px;color:var(--tx3)">${MN[lastCfm]} 이후 가용: <span style="color:var(--acc);font-family:var(--mono);font-weight:600">${fmt(avail)}원</span></div>`:''}
        </div>
      </div>
      <div class="rem-wrap"><div class="rem-fill" style="width:${Math.min(p,100)}%;background:${p>100?'var(--red)':p>90?'var(--amb)':'var(--grn)'}"></div>
        <div class="rem-label">잔여 ${fmtM(proj.budget-ann)}</div></div>
      <div class="tbl-wrap" style="margin-top:10px"><table>
        <thead><tr><th>월</th><th class="r">집행예정</th><th class="r">누적</th><th class="r">잔여예산</th><th class="r">확정누적</th><th class="r">확정 후 잔여</th></tr></thead>
        <tbody>
          ${mData.map(({m,me,cum,cfmCum,rem:rv,cfmRem})=>{
            const anyCfm=S.employees.some(e=>S.participation[e.id]?.[proj.id]&&isCfm(e.id,m));
            return`<tr${m===lastCfm?' style="background:rgba(46,204,135,0.04)"':''}>
              <td class="name" style="font-size:11px">${MN[m]}${m===lastCfm?'<span class="tag t-ok" style="font-size:9px;margin-left:4px">최근확정</span>':''}</td>
              <td class="num">${me>0?fmt(me):'-'}</td>
              <td class="num" style="color:var(--acc)">${fmt(cum)}</td>
              <td class="num" style="color:${rv<0?'var(--red)':rv<proj.budget*0.15?'var(--amb)':'var(--tx2)'};font-family:var(--mono)">${fmt(rv)}</td>
              <td class="num" style="color:${anyCfm?'var(--grn)':'var(--tx3)'}">${anyCfm?fmt(cfmCum):'-'}</td>
              <td class="num" style="color:${anyCfm?cfmRem<0?'var(--red)':'var(--acc)':'var(--tx3)'};font-family:var(--mono)">${anyCfm?fmt(cfmRem):'-'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>
    </div>`;
  }).join('')}`;
}

// ── ACTIONS ──
function nav(v){
  S.view=v;
  if(v==='proj'&&!S.selProj)S.selProj=S.projects[0]?.id;
  if(v==='emp'&&!S.selEmp)S.selEmp=S.employees[0]?.id;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('on',['dash','proj','emp','salary','master'][i]===v));
  render();

// ── RATE CELL RENDERER ──────────────────────────────
function rateCell(eid, pid, m) {
  const rate = getRate(eid, pid, m);
  const role = getRole(eid, pid, m);
  const eff  = effRate(eid, m);
  const proj = S.projects.find(p => p.id === pid);
  const low  = rate > 0 && proj && rate < proj.minRate;
  const over = eff > 100 && role !== 'cosd';

  let cls = '';
  let dot = 'background:var(--tx3)';
  if (over)      { cls = 'rc-over'; dot = 'background:var(--red)'; }
  else if (low)  { cls = 'rc-low';  dot = 'background:var(--amb)'; }
  else if (rate > 0) { cls = 'rc-ok'; dot = 'background:var(--grn)'; }

  const label = rate > 0 ? rate + '%' : '—';

  return `<span class="rate-cell ${cls}"
    onclick="openPop(event,'${eid}','${pid}',${m})"
    id="rc-${eid}-${pid}-${m}"
    title="${over ? '유효참여율 100% 초과' : low ? `최소 ${proj?.minRate}% 미달` : role || '미입력'}">
    <span class="rate-cell-dot" style="${dot}"></span>${label}
  </span>`;
}

// ── POPOVER STATE & LOGIC ────────────────────────────
const POP = { eid: null, pid: null, m: null, open: false };

function openPop(e, eid, pid, m) {
  e.stopPropagation();
  // 같은 셀 재클릭이면 닫기
  if (POP.open && POP.eid === eid && POP.pid === pid && POP.m === m) { closePop(); return; }

  POP.eid = eid; POP.pid = pid; POP.m = m; POP.open = true;

  const proj = S.projects.find(p => p.id === pid);
  const emp  = S.employees.find(e => e.id === eid);
  const rate = getRate(eid, pid, m);
  const role = getRole(eid, pid, m) || '공동';

  // 헤더
  document.getElementById('pop-proj-name').textContent = proj?.name || pid;
  document.getElementById('pop-month-label').textContent = `${emp?.name} · ${MN[m]}`;

  // 역할 버튼 활성화
  document.querySelectorAll('.pop-role').forEach(b => {
    b.className = 'pop-role' + (b.dataset.role === role ? ` sel-${role}` : '');
  });

  // 슬라이더 / 값
  document.getElementById('pop-slider').value = rate;
  popSlide(rate, false); // false = don't commit yet

  // 위치 계산
  const pop = document.getElementById('rate-pop');
  pop.classList.add('open');
  positionPop(e.currentTarget);

  // 활성 셀 표시
  document.querySelectorAll('.rate-cell.active').forEach(c => c.classList.remove('active'));
  e.currentTarget.classList.add('active');
}

function positionPop(triggerEl) {
  const pop  = document.getElementById('rate-pop');
  const rect = triggerEl.getBoundingClientRect();
  const pw   = 300, ph = 370;
  const vw   = window.innerWidth, vh = window.innerHeight;

  let top  = rect.bottom + 8;
  let left = rect.left;

  if (left + pw > vw - 12) left = vw - pw - 12;
  if (top  + ph > vh - 12) top  = rect.top - ph - 8;
  if (left < 12) left = 12;

  pop.style.top  = top  + 'px';
  pop.style.left = left + 'px';
}

function closePop() {
  document.getElementById('rate-pop').classList.remove('open');
  document.querySelectorAll('.rate-cell.active').forEach(c => c.classList.remove('active'));
  POP.open = false;
}

function popSlide(val, commit = true) {
  val = parseInt(val) || 0;
  const proj = S.projects.find(p => p.id === POP.pid);
  const emp  = S.employees.find(e => e.id === POP.eid);
  const sal  = getSal(POP.eid, POP.m);
  const role = getRole(POP.eid, POP.pid, POP.m) || '공동';

  // 미리 반영해서 계산 (실제 저장은 commit 시)
  const oldRate = getRate(POP.eid, POP.pid, POP.m);
  if (commit) {
    if (!S.participation[POP.eid]) S.participation[POP.eid] = {};
    if (!S.participation[POP.eid][POP.pid])
      S.participation[POP.eid][POP.pid] = Array.from({length:12}, () => ({rate:0, role:'공동'}));
    S.participation[POP.eid][POP.pid][POP.m].rate = val;
  }

  const execAmt = Math.round(sal * val / 100);
  // eff는 현재 저장값 기준으로 계산 (미리보기면 oldRate 빼고 val 더함)
  const effNow = effRate(POP.eid, POP.m)
    - (role !== 'cosd' ? oldRate : 0)
    + (role !== 'cosd' ? val : 0);
  const annExec = projAnn(POP.pid)
    - Math.round(getSal(POP.eid, POP.m) * oldRate / 100)
    + execAmt;
  const budget  = proj?.budget || 1;
  const remAmt  = budget - annExec;
  const effPct  = Math.min(effNow, 100);
  const remPct  = Math.max(0, Math.min(100, remAmt / budget * 100));

  // 큰 숫자 색상
  const bigCol = val === 0 ? 'var(--tx3)'
    : (effNow > 100 && role !== 'cosd') ? 'var(--red)'
    : (proj && val < proj.minRate && val > 0) ? 'var(--amb)'
    : 'var(--acc)';

  document.getElementById('pop-val').textContent = val;
  document.getElementById('pop-val').style.color = bigCol;
  document.getElementById('pop-exec').textContent = val > 0 ? `→ ${fmtM(execAmt)}원` : '';

  // 상태 패널
  document.getElementById('ps-exec').textContent = execAmt > 0 ? fmt(execAmt) + '원' : '-';
  const effEl = document.getElementById('ps-eff');
  effEl.textContent = effNow + '%';
  effEl.style.color = effNow > 100 ? 'var(--red)' : effNow > 90 ? 'var(--amb)' : 'var(--grn)';
  const effBar = document.getElementById('ps-eff-bar');
  effBar.style.width = effPct + '%';
  effBar.style.background = effNow > 100 ? 'var(--red)' : effNow > 90 ? 'var(--amb)' : 'var(--grn)';

  const remEl = document.getElementById('ps-rem');
  remEl.textContent = fmt(remAmt) + '원';
  remEl.style.color = remAmt < 0 ? 'var(--red)' : remAmt < budget * 0.1 ? 'var(--amb)' : 'var(--grn)';
  const remBar = document.getElementById('ps-rem-bar');
  remBar.style.width = remPct + '%';
  remBar.style.background = remPct < 15 ? 'var(--red)' : remPct < 30 ? 'var(--amb)' : 'var(--grn)';

  document.getElementById('ps-min-label').textContent = `최소 참여율 (${proj?.minRate || 10}%)`;
  const minEl = document.getElementById('ps-min');
  if (val === 0) { minEl.textContent = '미참여'; minEl.style.color = 'var(--tx3)'; }
  else if (proj && val < proj.minRate) { minEl.textContent = `미달 (${val}% < ${proj.minRate}%)`; minEl.style.color = 'var(--amb)'; }
  else { minEl.textContent = '충족'; minEl.style.color = 'var(--grn)'; }

  // 프리셋 버튼 활성화
  document.querySelectorAll('.pop-preset').forEach(b => {
    b.classList.toggle('active-pre', parseInt(b.textContent) === val);
  });

  // 슬라이더 배경 그라데이션
  const pct2 = val;
  const trackCol = val === 0 ? 'var(--sf2)'
    : (effNow > 100 && role !== 'cosd') ? '#f04060'
    : (proj && val < proj.minRate && val > 0) ? '#f0a030'
    : '#4f8ef7';
  document.getElementById('pop-slider').style.background =
    `linear-gradient(to right, ${trackCol} 0%, ${trackCol} ${pct2}%, var(--sf2) ${pct2}%, var(--sf2) 100%)`;

  // commit이면 셀 + 사이드바 + 요약 행 즉시 업데이트
  if (commit) {
    refreshCell(POP.eid, POP.pid, POP.m);
    refreshSummaryRow(POP.eid, POP.pid);
    renderSidebar();
  }
}

function popSetVal(v) {
  document.getElementById('pop-slider').value = v;
  popSlide(v, true);
}

function popSetRole(role) {
  if (!POP.eid || !POP.pid) return;
  if (!S.participation[POP.eid]) S.participation[POP.eid] = {};
  if (!S.participation[POP.eid][POP.pid])
    S.participation[POP.eid][POP.pid] = Array.from({length:12}, () => ({rate:0, role:'공동'}));
  // 같은 역할이면 전체 월에, 단일 월만 바꾸려면 m만
  S.participation[POP.eid][POP.pid][POP.m].role = role;
  document.querySelectorAll('.pop-role').forEach(b => {
    b.className = 'pop-role' + (b.dataset.role === role ? ` sel-${role}` : '');
  });
  popSlide(getRate(POP.eid, POP.pid, POP.m), true);
}

// 단일 셀만 업데이트 (전체 render 없이)
function refreshCell(eid, pid, m) {
  const el = document.getElementById(`rc-${eid}-${pid}-${m}`);
  if (!el) return;
  el.outerHTML = rateCell(eid, pid, m);
  // 새로 생성된 요소에 active 유지
  const newEl = document.getElementById(`rc-${eid}-${pid}-${m}`);
  if (newEl && POP.open && POP.eid === eid && POP.pid === pid && POP.m === m)
    newEl.classList.add('active');
}

// 합계 행만 업데이트
function refreshSummaryRow(eid, pid) {
  // eff 합계 행
  const effRowId = `sum-eff-${eid}`;
  const effRow = document.getElementById(effRowId);
  if (effRow) {
    effRow.innerHTML = Array.from({length:12}, (_, m) => {
      const e2 = effRate(eid, m), cr = cosdRate(eid, m);
      return `<td class="${sCls(e2)}" style="text-align:right">${e2}%${cr ? `<span style="font-size:10px;color:var(--grn)"> +${cr}</span>` : ''}</td>`;
    }).join('') + '<td></td>';
  }
  // 과제 집행 합계 행
  const projRowId = `sum-proj-${pid}`;
  const projRow = document.getElementById(projRowId);
  if (projRow) {
    projRow.innerHTML = Array.from({length:12}, (_, m) => {
      const parts = S.employees.filter(e => S.participation[e.id]?.[pid]);
      const tot = parts.reduce((s, e) => s + mExec(e.id, pid, m), 0);
      return `<td class="num" style="color:var(--tx2)">${tot > 0 ? fmt(tot) : '-'}</td>`;
    }).join('') + '<td></td>';
  }
}

function importXL(input){
  const file=input.files[0];if(!file)return;input.value='';
  const reader=new FileReader();
  reader.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'array'});const{data,msgs}=parseWB(wb);_pImport=data;document.getElementById('import-result').innerHTML=msgs.join('<br>');openOv('import-ov');}catch(err){toast('⚠ 파일 오류: '+err.message,4000)}};

function parseWB(wb){
  const data={employees:[],projects:[],participation:{},salary:{}},msgs=[];
  const g20s=wb.SheetNames.find(n=>{const rows=XLSX.utils.sheet_to_json(wb.Sheets[n],{defval:'',header:1});if(!rows[0])return false;const h=rows[0].map(c=>String(c).trim());return h.some(x=>x.includes('G20')||x.includes('사원코드'))&&h.some(x=>x.includes('이름'));});
  if(g20s){
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[g20s],{defval:'',header:1});
    const h=rows[0].map(c=>String(c).trim()),ci=h.findIndex(x=>x.includes('G20')||x.includes('사원코드')),ni=h.findIndex(x=>x.includes('이름'));
    let added=0;
    for(let i=1;i<rows.length;i++){const code=String(rows[i][ci]||'').trim(),name=String(rows[i][ni]||'').trim();if(!name||!code)continue;if(S.employees.find(e=>e.code===code)||data.employees.find(e=>e.code===code))continue;data.employees.push({id:autoId([...S.employees,...data.employees],'E'),name,code,rank:'연구원',baseSalary:0,isCosd:false});added++;}
    msgs.push(`<span style="color:var(--grn)">✓ G20 형식 인식</span>: ${added}명 신규 추가 예정 (직급·기본급은 추가 후 편집 필요)`);
  }
  if(!g20s&&wb.SheetNames.includes('직원마스터')){const rows=XLSX.utils.sheet_to_json(wb.Sheets['직원마스터'],{defval:''});for(const r of rows){const id=String(r['직원ID']||'').trim();if(!id)continue;data.employees.push({id,name:String(r['이름']||'').trim(),code:String(r['사원코드']||'').trim(),rank:String(r['직급']||'').trim(),baseSalary:Number(r['기본급(월)']||0),isCosd:String(r['COSD여부']||'').toUpperCase()==='Y'});}msgs.push(`<span style="color:var(--grn)">✓ 직원마스터</span>: ${data.employees.length}명`);}
  else if(!g20s)msgs.push(`<span style="color:var(--amb)">△ 직원마스터</span> 없음`);
  if(wb.SheetNames.includes('과제마스터')){const rows=XLSX.utils.sheet_to_json(wb.Sheets['과제마스터'],{defval:''});for(const r of rows){const id=String(r['과제ID']||'').trim();if(!id)continue;data.projects.push({id,name:String(r['과제명']||'').trim(),type:String(r['유형']||'normal').trim().toLowerCase(),budget:Number(r['인건비예산(원)']||0),include345:String(r['3책5공포함']||'').toUpperCase()==='Y',minRate:Number(r['최소참여율%']||10)});}msgs.push(`<span style="color:var(--grn)">✓ 과제마스터</span>: ${data.projects.length}건`);}
  else msgs.push(`<span style="color:var(--amb)">△ 과제마스터</span> 없음`);
  if(wb.SheetNames.includes('참여율')){const rows=XLSX.utils.sheet_to_json(wb.Sheets['참여율'],{defval:''});let cnt=0;for(const r of rows){const eid=String(r['직원ID']||'').trim(),pid=String(r['과제ID']||'').trim(),role=String(r['역할']||'공동').trim();if(!eid||!pid)continue;if(!data.participation[eid])data.participation[eid]={};data.participation[eid][pid]=MN.map(mn=>({rate:Number(r[mn+'%']||0),role}));cnt++;}msgs.push(`<span style="color:var(--grn)">✓ 참여율</span>: ${cnt}개 행`);}
  else msgs.push(`<span style="color:var(--amb)">△ 참여율</span> 없음`);
  if(wb.SheetNames.includes('급여실적')){const rows=XLSX.utils.sheet_to_json(wb.Sheets['급여실적'],{defval:''});for(const r of rows){const eid=String(r['직원ID']||'').trim();if(!eid)continue;data.salary[eid]=MN.map(mn=>{const v=r[mn];return(v!==''&&v!=null)?Number(v):null;});}msgs.push(`<span style="color:var(--grn)">✓ 급여실적</span>: ${Object.keys(data.salary).length}명`);}
  else msgs.push(`<span style="color:var(--amb)">△ 급여실적</span> 없음`);
  return{data,msgs};
}
function applyImport(){

  else if(d.employees.length>0)S.employees=d.employees;
  if(d.projects.length>0)S.projects=d.projects;
  if(Object.keys(d.participation).length>0)S.participation=d.participation;
  for(const[k,v]of Object.entries(d.salary))S.salary[k]=v;

S.selProj=S.projects[0]?.id;S.selEmp=S.employees[0]?.id;

const SUPA_URL = 'https://suunsnhegngvjuoguiie.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1dW5zbmhlZ25ndmp1b2d1aWllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzE5OTMsImV4cCI6MjA5MDM0Nzk5M30.fPXAQm1897s5FgrM7bri6ugZ1BCHWmOlSTEyyxhfCMU';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// 연결 상태 표시
function setDbStatus(state) {
  const el = document.getElementById('db-status');
  if (!el) return;
  const map = {
    connecting: ['🔄 DB 연결 중...', 'var(--tx3)'],
    ok:         ['🟢 Supabase 연결됨', 'var(--grn)'],
    error:      ['🔴 DB 연결 오류', 'var(--red)'],
    saving:     ['💾 저장 중...', 'var(--amb)'],
    saved:      ['✓ 저장됨', 'var(--grn)'],
  };
  const [text, color] = map[state] || ['', 'var(--tx3)'];
  el.textContent = text;
  el.style.color = color;
}

// ── DB → S (불러오기) ──────────────────────────
async function loadFromDB() {
  setDbStatus('connecting');
  try {
    const [empRes, projRes, partRes, salRes] = await Promise.all([
      db.from('employees').select('*'),
      db.from('projects').select('*'),
      db.from('participation').select('*'),
      db.from('salary').select('*'),
    ]);

    if (empRes.error) throw empRes.error;

    // 직원
    if (empRes.data.length > 0) {
      S.employees = empRes.data.map(r => ({
        id: r.id, name: r.name, code: r.code || '',
        rank: r.rank || '연구원',
        baseSalary: r.base_salary || 0,
        isCosd: r.is_cosd || false,
      }));
    }

    // 과제
    if (projRes.data.length > 0) {
      S.projects = projRes.data.map(r => ({
        id: r.id, name: r.name, type: r.type || 'normal',
        budget: r.budget || 0,
        include345: r.include_345 !== false,
        minRate: r.min_rate || 10,
      }));
    }

    // 참여율
    if (partRes.data.length > 0) {
      S.participation = {};
      for (const r of partRes.data) {
        if (!S.participation[r.emp_id]) S.participation[r.emp_id] = {};
        if (!S.participation[r.emp_id][r.proj_id])
          S.participation[r.emp_id][r.proj_id] = Array.from({length:12}, () => ({rate:0, role:'공동'}));
        S.participation[r.emp_id][r.proj_id][r.month] = {rate: r.rate, role: r.role};
      }
    }

    // 급여
    if (salRes.data.length > 0) {
      S.salary = {};
      for (const r of salRes.data) {
        if (!S.salary[r.emp_id]) S.salary[r.emp_id] = Array(12).fill(null);
        S.salary[r.emp_id][r.month] = r.amount;
      }
    }

    setDbStatus('ok');
    S.selProj = S.projects[0]?.id;
    S.selEmp  = S.employees[0]?.id;
    render();
    toast('✓ 데이터 불러오기 완료');
  } catch(e) {
    setDbStatus('error');
    toast('⚠ DB 오류: ' + e.message, 5000);
    render(); // 로컬 샘플 데이터로라도 렌더
  }
}

// ── S → DB (저장) ──────────────────────────────
async function saveToDB() {
  setDbStatus('saving');
  try {
    // 직원 upsert
    await db.from('employees').upsert(
      S.employees.map(e => ({
        id: e.id, name: e.name, code: e.code || '',
        rank: e.rank, base_salary: e.baseSalary, is_cosd: e.isCosd,
      })),
      { onConflict: 'id' }
    );

    // 과제 upsert
    await db.from('projects').upsert(
      S.projects.map(p => ({
        id: p.id, name: p.name, type: p.type,
        budget: p.budget, include_345: p.include345, min_rate: p.minRate,
      })),
      { onConflict: 'id' }
    );

    // 참여율 upsert
    const partRows = [];
    for (const eid of Object.keys(S.participation)) {
      for (const pid of Object.keys(S.participation[eid])) {
        for (let m = 0; m < 12; m++) {
          const d = S.participation[eid][pid][m];
          if (d) partRows.push({ emp_id: eid, proj_id: pid, month: m, rate: d.rate, role: d.role });
        }
      }
    }
    if (partRows.length > 0) {
      await db.from('participation').upsert(partRows, { onConflict: 'emp_id,proj_id,month' });
    }

    // 급여 upsert
    const salRows = [];
    for (const eid of Object.keys(S.salary)) {
      for (let m = 0; m < 12; m++) {
        const v = S.salary[eid][m];
        if (v != null) salRows.push({ emp_id: eid, month: m, amount: v });
      }
    }
    if (salRows.length > 0) {
      await db.from('salary').upsert(salRows, { onConflict: 'emp_id,month' });
    }

    setDbStatus('saved');
    toast('✓ Supabase에 저장 완료');
    setTimeout(() => setDbStatus('ok'), 3000);
  } catch(e) {
    setDbStatus('error');
    toast('⚠ 저장 오류: ' + e.message, 5000);
  }
}

// ── 삭제 헬퍼 ──────────────────────────────────
async function deleteEmpFromDB(eid) {
  await db.from('employees').delete().eq('id', eid);
}
async function deleteProjFromDB(pid) {
  await db.from('projects').delete().eq('id', pid);
}

// ── 기존 CRUD 함수에 DB 저장 후크 추가 ───────────
const _origSaveEmp = saveEmp;
saveEmp = async function() {
  _origSaveEmp();
  await saveToDB();
};
const _origDelEmp = delEmp;
delEmp = async function(eid) {
  const e = S.employees.find(x => x.id === eid);
  if (!confirm(`"${e?.name}" 삭제할까요?`)) return;
  S.employees = S.employees.filter(x => x.id !== eid);
  delete S.participation[eid]; delete S.salary[eid];
  await deleteEmpFromDB(eid);
  render(); toast(`✓ ${e?.name} 삭제`);
};
const _origSaveProj = saveProj;
saveProj = async function() {
  _origSaveProj();
  await saveToDB();
};
const _origDelProj = delProj;
delProj = async function(pid) {
  const p = S.projects.find(x => x.id === pid);
  if (!confirm(`"${p?.name}" 삭제할까요?`)) return;
  S.projects = S.projects.filter(x => x.id !== pid);
  for (const e of Object.keys(S.participation)) delete S.participation[e][pid];

};
const _origSaveSal = saveSal;
saveSal = async function() {
  _origSaveSal();
  await saveToDB();
};
const _origApplyImport = applyImport;
applyImport = async function() {
  _origApplyImport();
  await saveToDB();
};

// 참여율 변경 시 자동 저장 (디바운스)
let _saveTimer = null;
const _origUpdateRate = updateRate;
updateRate = function(eid, pid, m, val) {
  _origUpdateRate(eid, pid, m, val);
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    const d = S.participation[eid]?.[pid]?.[m];
    if (d) {
      await db.from('participation').upsert(
        [{emp_id: eid, proj_id: pid, month: m, rate: d.rate, role: d.role}],
        {onConflict: 'emp_id,proj_id,month'}
      );
      setDbStatus('saved');
      setTimeout(() => setDbStatus('ok'), 2000);
    }
  }, 800);
};

// 실시간 구독 (다른 사용자 변경사항 자동 반영)
function subscribeRealtime() {
  db.channel('labor-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'employees'},   () => loadFromDB())
    .on('postgres_changes', {event:'*', schema:'public', table:'projects'},    () => loadFromDB())
    .on('postgres_changes', {event:'*', schema:'public', table:'participation'}, payload => {
      // 참여율은 부분 업데이트
      const r = payload.new;
      if (r && r.emp_id && r.proj_id) {
        if (!S.participation[r.emp_id]) S.participation[r.emp_id] = {};
        if (!S.participation[r.emp_id][r.proj_id])
          S.participation[r.emp_id][r.proj_id] = Array.from({length:12}, () => ({rate:0, role:'공동'}));
        S.participation[r.emp_id][r.proj_id][r.month] = {rate: r.rate, role: r.role};
        render();
      }
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'salary'}, () => loadFromDB())
    .subscribe();
}

// ── 시작 ──────────────────────────────────────
loadFromDB();
subscribeRealtime();
